<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Toy Kingdom</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&amp;family=Nunito:wght@400;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        'toy-red': '#E31E24',
                        'sunshine-yellow': '#FFD700',
                        'deep-navy': '#1A237E',
                        'playful-blue': '#1565C0',
                        'grassy-green': '#388E3C',
                        'royal-gold': '#C8A96E',
                        'canvas-white': '#FFFFFF',
                    },
                    fontFamily: {
                        "headline": ["Fredoka One", "cursive"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "4xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .bouncy-hover:hover {
            transform: translateY(-4px) scale(1.02);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .antigravity-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        .bg-pattern {
            background-color: #ffffff;
            background-image: radial-gradient(#1565C011 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-pattern font-body text-deep-navy min-h-screen flex items-center justify-center overflow-hidden relative">
<!-- Antigravity Particle System (Floating Emojis) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="antigravity-float absolute top-[10%] left-[15%] text-6xl opacity-20">🧸</div>
<div class="antigravity-float absolute top-[20%] right-[20%] text-5xl opacity-20" style="animation-delay: -1s;">🚀</div>
<div class="antigravity-float absolute bottom-[15%] left-[25%] text-7xl opacity-20" style="animation-delay: -2s;">🧩</div>
<div class="antigravity-float absolute bottom-[25%] right-[10%] text-5xl opacity-20" style="animation-delay: -3s;">🎈</div>
<div class="antigravity-float absolute top-[40%] left-[5%] text-4xl opacity-20" style="animation-delay: -4.5s;">🎨</div>
<div class="antigravity-float absolute top-[60%] right-[30%] text-6xl opacity-20" style="animation-delay: -0.5s;">🚂</div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-6">
<div class="bg-canvas-white rounded-4xl shadow-[0_20px_50px_rgba(26,35,126,0.1)] p-10 border-b-8 border-playful-blue/10">
<!-- Branding Header -->
<div class="flex flex-col items-center mb-8">
<div class="text-royal-gold text-6xl mb-2 drop-shadow-sm">
<span class="material-symbols-outlined !text-7xl" style="font-variation-settings: 'FILL' 1;">article</span>
</div>
<h1 class="font-headline text-3xl text-toy-red tracking-wide uppercase">Toy Kingdom</h1>
<p class="text-deep-navy/60 font-bold mt-2">Enter the world of magic!</p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-headline text-sm text-deep-navy px-2">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-playful-blue/50 group-focus-within:text-playful-blue">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-transparent focus:border-playful-blue focus:bg-white rounded-3xl outline-none transition-all font-semibold text-deep-navy placeholder:text-deep-navy/30" placeholder="sparky@magic.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-headline text-sm text-deep-navy px-2">Magic Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-playful-blue/50 group-focus-within:text-playful-blue">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-transparent focus:border-playful-blue focus:bg-white rounded-3xl outline-none transition-all font-semibold text-deep-navy placeholder:text-deep-navy/30" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Forgot Password Link -->
<div class="text-right">
<a class="text-sm font-bold text-playful-blue hover:text-toy-red transition-colors" href="#">Forgot Magic Key?</a>
</div>
<!-- Login Button -->
<button class="bouncy-hover w-full bg-toy-red text-white font-headline text-xl py-4 rounded-full shadow-[0_6px_0_0_#b71c1c] active:shadow-none active:translate-y-1 flex items-center justify-center gap-3 transition-all" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
</button>
</form>
<!-- Separator -->
<div class="relative my-10 flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t-2 border-slate-100"></div>
</div>
<div class="relative bg-canvas-white px-4">
<span class="font-headline text-slate-300 text-sm">OR</span>
</div>
</div>
<!-- Create Account Button -->
<button class="bouncy-hover w-full bg-sunshine-yellow text-toy-red font-headline text-lg py-4 rounded-full shadow-[0_6px_0_0_#EBB400] active:shadow-none active:translate-y-1 transition-all">
                Create Account
            </button>
<!-- Guest Checkout Link -->
<p class="mt-8 text-center text-sm font-bold text-deep-navy/40">
                Just browsing? <a class="text-grassy-green hover:underline" href="#">Enter as Guest</a>
</p>
</div>
<!-- Footer Info -->
<div class="mt-8 text-center">
<p class="font-bold text-deep-navy/30 text-xs uppercase tracking-widest">
                © 2024 Toy Kingdom • Built with Magic &amp; Gravity
            </p>
</div>
</main>
<!-- Decorative Corner Element -->
<div class="absolute bottom-[-50px] left-[-50px] w-64 h-64 bg-sunshine-yellow rounded-full opacity-10 blur-3xl"></div>
<div class="absolute top-[-50px] right-[-50px] w-64 h-64 bg-toy-red rounded-full opacity-10 blur-3xl"></div>
</body></html>
